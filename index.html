<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer de Estudo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #cfd3dc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .mobile {
      width: 360px;
      height: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #ececf1;
      width: 90%;
      padding: 20px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #5a4fcf;
      margin-bottom: 15px;
    }

    .timer-box {
      background: linear-gradient(135deg, #5a4fcf, #6c5ce7);
      color: white;
      text-align: center;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .timer-box span {
      font-size: 32px;
      font-weight: bold;
      display: block;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      margin-bottom: 15px;
      background: #f4f4f7;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5a4fcf, #6c5ce7);
      color: white;
    }

    .btn-stop {
      background: #ff5c5c;
      color: white;
    }

    .btn-secondary {
      background: #dcdce3;
    }

    .relatorio {
      margin-top: 15px;
      font-size: 13px;
    }

    .item {
      background: #f4f4f7;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="mobile">
  <div class="card">

    <h2>Foco</h2>

    <div class="timer-box">
      Tempo restante
      <span id="timer">00:00</span>
    </div>

    <label>Disciplina</label>
    <select id="disciplina">
      <option value="">Selecionar</option>
      <option>Banco de Dados</option>
      <option>Estrutura de Dados</option>
      <option>Algoritmos</option>
    </select>

    <label>Duração (HH:MM)</label>
    <input type="text" id="tempo" placeholder="Ex: 01:30">

    <button class="btn btn-primary" onclick="iniciar()">Iniciar</button>
    <button class="btn btn-stop" onclick="parar()">Parar</button>
    <button class="btn btn-secondary" onclick="mostrarRelatorio()">Relatório</button>

    <div id="relatorio" class="relatorio"></div>

  </div>
</div>

<script>
  let intervalo;
  let tempoRestante = 0;
  let disciplinaAtual = "";

  const dados = {
    "Banco de Dados": 0,
    "Estrutura de Dados": 0,
    "Algoritmos": 0
  };

  function validarTempo(valor) {
    return /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(valor);
  }

  function paraMinutos(hhmm) {
    const [h, m] = hhmm.split(":").map(Number);
    return h * 60 + m;
  }

  function atualizarTela() {
    const min = Math.floor(tempoRestante / 60);
    const sec = tempoRestante % 60;
    document.getElementById("timer").textContent =
      `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function iniciar() {
    const disciplina = document.getElementById("disciplina").value;
    const tempo = document.getElementById("tempo").value;

    if (!disciplina || !validarTempo(tempo)) {
      alert("Preencha corretamente!");
      return;
    }

    disciplinaAtual = disciplina;
    tempoRestante = paraMinutos(tempo) * 60;

    atualizarTela();

    intervalo = setInterval(() => {
      tempoRestante--;
      atualizarTela();

      if (tempoRestante <= 0) {
        clearInterval(intervalo);

        const minutos = paraMinutos(tempo);
        dados[disciplinaAtual] += minutos;

        alert("Sessão concluída! + pontos 🎉");
      }
    }, 1000);
  }

  function parar() {
    clearInterval(intervalo);
  }

  function formatar(min) {
    const h = Math.floor(min / 60);
    const m = min % 60;
    return `${h}h ${m}min`;
  }

  function mostrarRelatorio() {
    const div = document.getElementById("relatorio");
    div.innerHTML = "";

    for (let mat in dados) {
      const el = document.createElement("div");
      el.classList.add("item");
      el.innerHTML = `<span>${mat}</span> <span>${formatar(dados[mat])}</span>`;
      div.appendChild(el);
    }
  }
</script>

</body>
</html>
