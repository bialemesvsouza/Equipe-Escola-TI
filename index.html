<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recompensas</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: #eef2ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      color: #4f46e5;
    }

    .points {
      background: #4f46e5;
      color: white;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 16px;
    }

    .points span {
      font-size: 22px;
      font-weight: 600;
    }

    .office {
      margin-bottom: 16px;
    }

    .office-title {
      font-size: 13px;
      margin-bottom: 8px;
      color: #444;
    }

    .room {
      position: relative;
      height: 160px;
      border-radius: 12px;
      background: linear-gradient(#c7d2fe 40%, #a5b4fc 40%);
      overflow: hidden;
    }

 
    .floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60%;
      background: #e5e7eb;
    }

    .desk {
      position: absolute;
      bottom: 30px;
      left: 20px;
      width: 80px;
      height: 40px;
      background: #8b5cf6;
      border-radius: 6px;
    }

    .pc {
      position: absolute;
      bottom: 60px;
      left: 35px;
      width: 40px;
      height: 25px;
      background: #111;
      border-radius: 4px;
    }

    .chair {
      position: absolute;
      bottom: 20px;
      left: 110px;
      width: 30px;
      height: 30px;
      background: #6366f1;
      border-radius: 6px;
    }

    .plant {
      position: absolute;
      bottom: 25px;
      right: 20px;
      width: 20px;
      height: 30px;
      background: #22c55e;
      border-radius: 4px;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
    }

    .reward {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .reward-info {
      font-size: 13px;
    }

    .reward button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .reward button:hover {
      background: #4338ca;
    }

    .history {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }

  </style>
</head>
<body>

  <div class="app">

    <div class="header">
      <h1> Recompensas</h1>
    </div>

    <div class="points">
      Seus pontos<br>
      <span>1200</span>
    </div>


    <div class="office">
      <div class="office-title">Seu escritório</div>
      <div class="room">
        <div class="floor"></div>
        <div class="desk"></div>
        <div class="pc"></div>
        <div class="chair"></div>
        <div class="plant"></div>
      </div>
    </div>

    <div class="section-title">Loja</div>

    <div class="reward">
      <div class="reward-info">Upgrade cadeira</div>
      <button>500 pts</button>
    </div>

    <div class="reward">
      <div class="reward-info">Novo setup</div>
      <button>700 pts</button>
    </div>

    <div class="reward">
      <div class="reward-info">Decoração</div>
      <button>200 pts</button>
    </div>

    <div class="history">
       Estude diariamente para evoluir seu espaço
    </div>

    <div style="margin-top:10px; font-size:11px; color:#16a34a; text-align:center;">

    </div>

  </div>

</body>
</html>
